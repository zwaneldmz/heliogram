name: CI

# heliogram's claims are pin-based (Reed-Solomon/Pillow-version-sensitive PNG bytes, palette
# geometry tied to a specific patch size). This workflow exists to catch exactly the class of
# failure that already happened once: an untested Pillow bump silently changing PNG container
# bytes underneath a "byte-identical" claim (see README's determinism note). Kept deliberately
# minimal and fast -- the suite runs in ~30s -- so it stays cheap to run on every push and PR.

on:
  push:
  pull_request:

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install heliogram + test deps
        run: pip install -e . pytest

      - name: Run tests
        run: python -m pytest tests/ -q

      - name: Install fonts (for heliogram.typography's geometric packing check)
        # heliogram/typography.py's _load_monospace_font deliberately refuses to fall back to a
        # proportional font (see its docstring), so a real monospace TrueType font must be
        # present for `make smoke` to reach heliogram.typography's model-free CLI check below.
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends fonts-dejavu-core

      - name: make smoke (model-free repro harness -- pytest + version-stable CLI invariants)
        run: make smoke
