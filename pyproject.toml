[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "heliogram"
version = "0.1.0"
description = "Optical context compression for self-hosted VLMs: measuring the data-channel capacity of ViT patches."
readme = "README.md"
license = { text = "Apache-2.0" }
requires-python = ">=3.9"
dependencies = [
    "pillow>=9.0",
    "numpy>=1.21",
    "reedsolo>=1.5",
]

[project.optional-dependencies]
dev = ["pytest>=7.0"]

[tool.setuptools.packages.find]
include = ["heliogram*"]
